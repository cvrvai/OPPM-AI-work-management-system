<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <div id="result">Loading...</div>
    <script>
        async function testAPI() {
            const token = localStorage.getItem('access_token');
            const resultDiv = document.getElementById('result');
            
            if (!token) {
                resultDiv.innerHTML = '<p style="color:red">No token in localStorage</p>';
                return;
            }
            
            try {
                // Test auth/me
                const meRes = await fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const meText = await meRes.text();
                
                // Test workspaces
                const wsRes = await fetch('/api/v1/workspaces', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const wsText = await wsRes.text();
                
                resultDiv.innerHTML = `
                    <p><strong>Token:</strong> ${token.substring(0, 50)}...</p>
                    <p><strong>Auth/me status:</strong> ${meRes.status}</p>
                    <p><strong>Auth/me response:</strong> ${meText.substring(0, 200)}</p>
                    <p><strong>Workspaces status:</strong> ${wsRes.status}</p>
                    <p><strong>Workspaces response:</strong> ${wsText.substring(0, 200)}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
