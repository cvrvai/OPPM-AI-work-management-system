worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── CORS helper ────────────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https://oppm\.yourdomain\.com$" $http_origin;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50m;

        # ── CORS headers ──────────────────────────────────────────────────────
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Request headers ───────────────────────────────────────────────────
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # ── Upstream variables ────────────────────────────────────────────────
        set $upstream_workspace    http://workspace:8000;
        set $upstream_ai           http://intelligence:8001;

        # ── Workspace routes (auth, workspaces, projects, tasks, notifications, github) ──
        location ~ ^/api/v1/workspaces/?$ {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/?$ {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/members {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/invites {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/invite/ {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/notifications {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/github-accounts {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/commits {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/git/ {
            proxy_pass $upstream_workspace;
        }

        location = /api/v1/git/webhook {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/projects {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/tasks {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/oppm {
            proxy_pass $upstream_workspace;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/agile {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/waterfall {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/dashboard {
            proxy_pass $upstream_workspace;
        }

        location ~ ^/api/v1/workspaces/[^/]+/export {
            proxy_pass $upstream_workspace;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/google-sheets {
            proxy_pass $upstream_workspace;
            proxy_read_timeout 120s;
        }

        # ── AI service routes (most specific first) ───────────────────────────
        location ~ ^/api/v1/workspaces/[^/]+/projects/[^/]+/ai/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/rag/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/ai/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location = /internal/analyze-commits {
            proxy_pass $upstream_ai;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── MCP routes (merged into intelligence) ──────────────────────────────
        location ~ ^/api/v1/workspaces/[^/]+/mcp/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /mcp {
            proxy_pass $upstream_ai;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
        }

        # ── Health checks ─────────────────────────────────────────────────────
        location = /health/workspace { proxy_pass $upstream_workspace/health; }
        location = /health/ai { proxy_pass $upstream_ai/health; }

        # ── Fallback to workspace ─────────────────────────────────────────────
        location / {
            proxy_pass $upstream_workspace;
        }
    }
}
