services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: oppm
      POSTGRES_USER: oppm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oppm_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oppm"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-oppm_dev_password}
    volumes:
      - redis_data:/data

  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      core:
        condition: service_healthy
      ai:
        condition: service_healthy
      git:
        condition: service_healthy
      mcp:
        condition: service_healthy

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    expose:
      - "8000"
    env_file:
      - services/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://oppm:${DB_PASSWORD:-oppm_dev_password}@postgres:5432/oppm
      - REDIS_URL=redis://:${REDIS_PASSWORD:-oppm_dev_password}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    expose:
      - "8001"
    env_file:
      - services/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://oppm:${DB_PASSWORD:-oppm_dev_password}@postgres:5432/oppm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  git:
    build:
      context: .
      dockerfile: services/git/Dockerfile
    expose:
      - "8002"
    env_file:
      - services/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://oppm:${DB_PASSWORD:-oppm_dev_password}@postgres:5432/oppm
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    expose:
      - "8003"
    env_file:
      - services/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://oppm:${DB_PASSWORD:-oppm_dev_password}@postgres:5432/oppm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    expose:
      - "5173"

networks:
  default:
    name: oppm-network

volumes:
  postgres_data:
  redis_data:
