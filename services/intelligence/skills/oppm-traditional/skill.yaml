    description: "Complete fill for empty sheet"
  - file: "examples/add_border.json"
    description: "Add borders to task rows"
  - file: "examples/fix_borders.json"
    description: "Fix thick borders on a row"
  - file: "examples/make_standard.json"
    description: "Make sheet standard (30 task rows)"
  - file: "examples/recreate.json"
    description: "Delete and recreate form"
