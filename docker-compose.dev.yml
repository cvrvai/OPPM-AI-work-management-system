# Development overrides — hot reload, volume mounts, direct port access
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  gateway:
    ports:
      - "80:80"

  workspace:
    volumes:
      - ./shared:/shared
      - ./services/workspace:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  intelligence:
    volumes:
      - ./shared:/shared
      - ./services/intelligence:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"

  integrations:
    volumes:
      - ./shared:/shared
      - ./services/integrations:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"

  automation:
    volumes:
      - ./shared:/shared
      - ./services/automation:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_PROXY_BASE=http://gateway:80
    depends_on:
      - gateway
    ports:
      - "5173:5173"
