# Development overrides — hot reload, volume mounts, direct port access
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  gateway:
    ports:
      - "80:80"

  workspace:
    volumes:
      - ./shared:/shared
      - ./services/workspace:/app
    # --reload disabled in Docker to prevent watchfiles CPU burn;
    # restart container after code changes, or run locally with start.ps1 for hot reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  intelligence:
    volumes:
      - ./shared:/shared
      - ./services/intelligence:/app
    # --reload disabled in Docker to prevent watchfiles CPU burn
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_PROXY_BASE=http://gateway:80
    depends_on:
      - gateway
    ports:
      - "5173:5173"
