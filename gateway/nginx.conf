worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    # ── Logging ──
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Docker internal DNS resolver — re-queries on every request (TTL 5s) ──
    # This prevents stale IP caches when containers restart and change IP.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── CORS helper (applied globally) ──
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
    }

    server {
        listen 80;
        server_name _;

        # ── Global CORS headers ──
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Request ID ──
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # ── Upstream variables — resolver re-queries Docker DNS on each use ──
        set $upstream_core http://core:8000;
        set $upstream_ai   http://ai:8001;
        set $upstream_git  http://git:8002;
        set $upstream_mcp  http://mcp:8003;

        # ── AI service routes (most specific first) ──
        location ~ ^/api/v1/workspaces/[^/]+/projects/[^/]+/ai/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/rag/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/ai/ {
            proxy_pass $upstream_ai;
            proxy_read_timeout 120s;
        }

        location = /internal/analyze-commits {
            proxy_pass $upstream_ai;
            proxy_read_timeout 120s;
        }

        location ~ ^/api/v1/workspaces/[^/]+/mcp/ {
            proxy_pass $upstream_mcp;
            proxy_read_timeout 120s;
        }

        # ── Git service routes ──
        location ~ ^/api/v1/workspaces/[^/]+/github-accounts {
            proxy_pass $upstream_git;
        }

        location ~ ^/api/v1/workspaces/[^/]+/commits {
            proxy_pass $upstream_git;
        }

        location ~ ^/api/v1/workspaces/[^/]+/git/ {
            proxy_pass $upstream_git;
        }

        location = /api/v1/git/webhook {
            proxy_pass $upstream_git;
        }

        # ── MCP SSE endpoint ──
        location /mcp {
            proxy_pass $upstream_mcp;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
        }

        # ── Health checks ──
        location = /health/core {
            proxy_pass $upstream_core/health;
        }
        location = /health/ai {
            proxy_pass $upstream_ai/health;
        }
        location = /health/git {
            proxy_pass $upstream_git/health;
        }
        location = /health/mcp {
            proxy_pass $upstream_mcp/health;
        }

        # ── All other API routes → core ──
        location /api/ {
            proxy_pass $upstream_core;
        }

        # ── Frontend (fallback) — uses variable proxy to avoid startup failure if not running ──
        location / {
            set $frontend_upstream http://frontend:5173;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
